<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RepoPulse — Investigation Report</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo">REPOPULSE</a>
    <div class="nav-links">
      <a href="https://github.com/devmish/repo-pulse" target="_blank" rel="noopener" class="nav-link">How it works ↗</a>
    </div>
  </div>
</nav>

<main class="report-main" id="report-main">
  <div class="feed-loading">Loading investigation…</div>
</main>

<!-- Metric tooltip panel (shared, moved by JS) -->
<div class="metric-tooltip" id="metric-tooltip" hidden>
  <div class="mtt-title" id="mtt-title"></div>
  <div class="mtt-body" id="mtt-body"></div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <span class="footer-logo">REPOPULSE</span>
    <span class="footer-sep">·</span>
    <span>LangGraph + GPT-4o-mini + pgvector</span>
  </div>
</footer>

<script>
// ── Metric metadata ────────────────────────────────────────────────────────────
const METRIC_INFO = {
  pr_median_merge_hours: {
    name: 'Median PR Merge Time',
    unit: 'h',
    what: 'How long it takes a pull request to go from opened to merged, measured in hours. Uses the <strong>median</strong> (middle value), not the mean, so one very old PR merging quietly doesn\'t distort the signal.',
    how:  'For each PR merged during the detection window, RepoPulse computes <code>hours_open = merge_time − open_time</code>. It takes the 50th percentile (median) across all PRs merged that week, then compares it to the median of the prior 28 days using a MAD z-score.',
    example: 'If 5 PRs merged in 4h, 8h, 12h, 48h, 800h — the median is <strong>12h</strong>. The mean would be 174h, dominated by the 800h outlier. Median correctly says "most PRs are merging in ~12h."',
  },
  issue_opened: {
    name: 'Issue Open Rate',
    unit: '/day',
    what: 'The average number of new issues opened per day in the repository during the detection window.',
    how:  'Counts <code>IssuesEvent</code> entries with <code>action = opened</code> from the GH Archive hourly data, then divides by 7 (the window length). Compares the 7-day average to the prior 28-day median.',
    example: 'If 42 new issues were opened across a 7-day window, the rate is <strong>6 issues/day</strong>. If the prior month averaged 2/day, that\'s a 3× spike.',
  },
  star_count: {
    name: 'Daily Stars',
    unit: '/day',
    what: 'How many people starred the repository per day on average. GitHub records each star as a <code>WatchEvent</code> in the public event stream.',
    how:  'Counts <code>WatchEvent</code> entries from GH Archive for the 7-day window and divides by 7. Compares the 7-day average to the prior 28-day median using a MAD z-score.',
    example: 'If the repo normally gets 80 stars/day but received 400/day for a week, that\'s a <strong>5× spike</strong> — likely triggered by a viral post or press coverage.',
  },
};

const ANOMALY_LABELS = {
  pr_slowdown: 'PR Slowdown',
  issue_spike: 'Issue Spike',
  star_spike:  'Star Spike',
};

const CITATION_LABELS = {
  sql_result:     'Query',
  artifact_chunk: 'GitHub PR',
  release_note:   'Release',
};

// ── Formatters ─────────────────────────────────────────────────────────────────
function fmt(value, metricName) {
  const info = METRIC_INFO[metricName] || {};
  const unit = info.unit || '';
  const v = parseFloat(value);
  return (v % 1 === 0 ? v.toFixed(0) : v.toFixed(1)) + unit;
}

function fmtWindow(start, end) {
  const s = new Date(start), e = new Date(end);
  const opts = { month: 'short', day: 'numeric' };
  return `${s.toLocaleDateString('en-US', opts)} – ${e.toLocaleDateString('en-US', { ...opts, year: 'numeric' })}`;
}

function fmtDatetime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function shortUrl(url) {
  if (!url || url.startsWith('SQL')) return url || '';
  try {
    const u = new URL(url);
    return u.pathname.replace(/^\//, '');  // strip leading slash
  } catch { return url; }
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
function showTooltip(btn, metricName) {
  const info = METRIC_INFO[metricName];
  if (!info) return;

  const tt = document.getElementById('metric-tooltip');
  document.getElementById('mtt-title').textContent = info.name;
  document.getElementById('mtt-body').innerHTML = `
    <p><strong>What it measures:</strong> ${info.what}</p>
    <p><strong>How it's computed:</strong> ${info.how}</p>
    <p class="mtt-example"><strong>Example:</strong> ${info.example}</p>
  `;
  tt.hidden = false;

  const r = btn.getBoundingClientRect();
  tt.style.top  = (window.scrollY + r.bottom + 8) + 'px';
  tt.style.left = Math.min(r.left, window.innerWidth - 360) + 'px';
}

document.addEventListener('click', e => {
  const btn = e.target.closest('.metric-info-btn');
  const tt  = document.getElementById('metric-tooltip');
  if (btn) {
    e.stopPropagation();
    if (!tt.hidden && tt.dataset.metric === btn.dataset.metric) {
      tt.hidden = true;
    } else {
      tt.dataset.metric = btn.dataset.metric;
      showTooltip(btn, btn.dataset.metric);
    }
  } else if (!e.target.closest('#metric-tooltip')) {
    tt.hidden = true;
  }
});

// ── Render ────────────────────────────────────────────────────────────────────
function renderReport(r) {
  const ghUrl      = `https://github.com/${r.repo}`;
  const info       = METRIC_INFO[r.metric_name] || {};
  const metricName = info.name || r.metric_name;
  const mult       = r.baseline > 0 ? (r.observed / r.baseline) : 0;
  const multLabel  = mult >= 2   ? `${mult.toFixed(0)}×`
                   : mult > 1.05 ? `+${Math.round((mult-1)*100)}%`
                   : mult < 0.5  ? `${(1/mult).toFixed(0)}× less`
                   : '';

  // Evidence
  const evidenceHtml = (r.evidence && r.evidence.length)
    ? r.evidence.map((e, i) => `
        <div class="ev-row">
          <span class="ev-num">${i + 1}</span>
          <span class="ev-text">${e}</span>
        </div>`).join('')
    : '<p class="dim-text">No evidence recorded.</p>';

  // Citations
  const citationsHtml = (r.citations && r.citations.length)
    ? r.citations.map(c => {
        const label   = CITATION_LABELS[c.type] || c.type;
        const isLink  = c.url && !c.url.startsWith('SQL');
        const urlPart = isLink
          ? `<a class="cit-url" href="${c.url}" target="_blank" rel="noopener">${shortUrl(c.url)}</a>`
          : `<span class="cit-url cit-sql">${c.url || ''}</span>`;
        const excerpt = c.excerpt ? `<span class="cit-excerpt">${c.excerpt.slice(0, 100)}</span>` : '';
        return `
          <div class="cit-row">
            <span class="badge badge-${c.type}">${label}</span>
            ${urlPart}
            ${excerpt}
          </div>`;
      }).join('')
    : '<p class="dim-text">No sources recorded.</p>';

  return `
    <a href="index.html" class="back-link">← Back to feed</a>

    <div class="rpt-header">
      <div class="rpt-title-row">
        <a href="${ghUrl}" target="_blank" rel="noopener" class="rpt-repo-link">
          ${r.repo} ↗
        </a>
        <span class="rpt-meta">${fmtWindow(r.window_start, r.window_end)} · ${fmtDatetime(r.created_at)}</span>
      </div>
      <div class="rpt-badges">
        <span class="badge badge-${r.anomaly_type}">${ANOMALY_LABELS[r.anomaly_type] || r.anomaly_type}</span>
        <span class="badge badge-${r.confidence}">${r.confidence} confidence</span>
      </div>
    </div>

    <div class="metric-strip">
      <div class="ms-block ms-baseline">
        <div class="ms-label">Normal (prior 28 days)</div>
        <div class="ms-value">${fmt(r.baseline, r.metric_name)}</div>
      </div>
      <div class="ms-arrow">
        ${multLabel ? `<span class="ms-mult">${multLabel}</span>` : ''}
        <span class="ms-arrow-icon">→</span>
      </div>
      <div class="ms-block ms-observed">
        <div class="ms-label">During anomaly (last 7 days)</div>
        <div class="ms-value">${fmt(r.observed, r.metric_name)}</div>
      </div>
      <div class="ms-meta">
        <span class="ms-name">${metricName}</span>
        <button class="metric-info-btn" data-metric="${r.metric_name}" aria-label="How ${metricName} is measured">ⓘ</button>
        <span class="ms-zscore">z = ${r.z_score.toFixed(2)}</span>
      </div>
    </div>

    <div class="rpt-section">
      <div class="rpt-section-label">Root Cause</div>
      <p class="rpt-root-cause">${r.root_cause || r.summary || ''}</p>
    </div>

    <div class="rpt-section">
      <div class="rpt-section-label">Evidence</div>
      <div class="ev-list">${evidenceHtml}</div>
    </div>

    <div class="rpt-section">
      <div class="rpt-section-label">Sources <span class="dim-count">${(r.citations || []).length}</span></div>
      <div class="cit-list">${citationsHtml}</div>
    </div>

    ${r.limitations ? `
    <details class="rpt-limitations">
      <summary class="rpt-limitations-toggle">Limitations</summary>
      <p class="rpt-limitations-text">${r.limitations}</p>
    </details>` : ''}

    <div class="rpt-footer">
      <span>RepoPulse</span>
      <span class="rfooter-sep">·</span>
      <span>LangGraph + GPT-4o-mini</span>
      <span class="rfooter-sep">·</span>
      <span>${r.tool_calls} queries · ${r.duration_s}s</span>
    </div>
  `;
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const id     = params.get('id');
  const main   = document.getElementById('report-main');

  if (!id) {
    main.innerHTML = '<div class="feed-empty">No report ID. <a href="index.html" style="color:var(--amber)">← Back</a></div>';
    return;
  }

  let report;
  try {
    const res = await fetch(`data/reports/${id}.json`);
    if (!res.ok) throw new Error('not found');
    report = await res.json();
  } catch {
    main.innerHTML = `<div class="feed-empty">Report #${id} not found. <a href="index.html" style="color:var(--amber)">← Back</a></div>`;
    return;
  }

  document.title = `RepoPulse — ${report.repo} ${ANOMALY_LABELS[report.anomaly_type] || ''}`;
  main.innerHTML = renderReport(report);
}

init();
</script>
</body>
</html>
